name: Claude Code

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'claude') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          base_branch: dev

      - name: Merge into dev
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          sleep 5
          PR_NUM=$(gh pr list --base dev --json number,headRefName \
            --jq ".[] | select(.headRefName | test(\"issue-${ISSUE_NUM}\")) | .number" | head -1)
          if [ -n "$PR_NUM" ]; then
            gh pr merge "$PR_NUM" --merge --delete-branch
          fi

      - name: Open or update dev → main PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head dev --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base main \
              --head dev \
              --title "Dev — pending issues" \
              --body "Preview branch containing completed issues. Merge to publish to main."
          fi
