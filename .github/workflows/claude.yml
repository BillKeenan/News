name: Claude Code

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'claude') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && github.event.comment.user.type != 'Bot')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          base_branch: dev

      - name: Merge into dev
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          ISSUE_NUM="${{ github.event.issue.number }}"
          git fetch origin
          CLAUDE_BRANCH=$(git branch -r | grep "origin/claude/issue-${ISSUE_NUM}" | head -1 | sed 's|.*origin/||' | xargs)
          if [ -n "$CLAUDE_BRANCH" ]; then
            git checkout dev
            git pull origin dev
            git merge --no-ff "origin/${CLAUDE_BRANCH}" -m "Merge issue #${ISSUE_NUM} into dev"
            git push origin dev
            git push origin --delete "${CLAUDE_BRANCH}"
            gh pr list --head "$CLAUDE_BRANCH" --json number --jq '.[].number' | xargs -I{} gh pr close {}
          fi

      - name: Open or update dev → main PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          EXISTING=$(gh pr list --base main --head dev --json number,body --jq '.[0]')
          PR_NUM=$(echo "$EXISTING" | jq -r '.number // empty')
          if [ -z "$PR_NUM" ]; then
            BODY="Preview branch containing completed issues. Merge to publish to main."$'\n\n'"Closes #${ISSUE_NUM}"
            gh pr create --base main --head dev --title "Dev — pending issues" --body "$BODY"
          else
            CURRENT_BODY=$(echo "$EXISTING" | jq -r '.body')
            if ! echo "$CURRENT_BODY" | grep -q "Closes #${ISSUE_NUM}"; then
              NEW_BODY="${CURRENT_BODY}"$'\n'"Closes #${ISSUE_NUM}"
              gh pr edit "$PR_NUM" --body "$NEW_BODY"
            fi
          fi
